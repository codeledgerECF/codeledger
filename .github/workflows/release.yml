name: Create Release

# Trigger: push a tag like vX.Y.Z
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Download npm package
        id: npm_download
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          TARBALL_NAME="codeledger-cli-${VERSION}.tgz"

          echo "Downloading @codeledger/cli@${VERSION} from npm..."

          DOWNLOAD_OK=false

          # Method 1: try npm pack (5 attempts with backoff)
          for attempt in 1 2 3 4 5; do
            echo "--- Attempt $attempt: npm pack ---"
            npm pack "@codeledger/cli@${VERSION}" && true
            TARBALL=$(ls codeledger-cli-*.tgz 2>/dev/null | head -1)
            if [ -n "$TARBALL" ]; then
              echo "✓ Downloaded $TARBALL via npm pack"
              echo "NPM_VERIFIED=true" >> "$GITHUB_ENV"
              echo "NPM_TARBALL=$TARBALL" >> "$GITHUB_ENV"
              DOWNLOAD_OK=true
              break
            fi
            echo "npm pack did not produce a tarball, waiting $((attempt * 10))s..."
            sleep $((attempt * 10))
          done

          # Method 2: fallback to direct registry download
          if [ "$DOWNLOAD_OK" != "true" ]; then
            echo "npm pack failed, trying direct registry download..."
            REGISTRY_URL="https://registry.npmjs.org/@codeledger/cli/-/cli-${VERSION}.tgz"
            if curl -fsSL -o "$TARBALL_NAME" "$REGISTRY_URL"; then
              echo "✓ Downloaded $TARBALL_NAME via registry URL"
              echo "NPM_VERIFIED=true" >> "$GITHUB_ENV"
              echo "NPM_TARBALL=$TARBALL_NAME" >> "$GITHUB_ENV"
              DOWNLOAD_OK=true
            fi
          fi

          if [ "$DOWNLOAD_OK" != "true" ]; then
            echo "::error::@codeledger/cli@${VERSION} not found on npm after 5 attempts + direct download. Cannot create release without the package."
            exit 1
          fi

      - name: Strip source maps and proprietary declarations from package
        run: |
          echo "Stripping IP-sensitive files from npm tarball..."
          TARBALL="${NPM_TARBALL}"
          WORK_DIR=$(mktemp -d)

          # Extract tarball
          tar xzf "$TARBALL" -C "$WORK_DIR"

          # Remove source maps (reveal internal structure)
          MAP_COUNT=$(find "$WORK_DIR" -name '*.js.map' | wc -l)
          find "$WORK_DIR" -name '*.js.map' -delete
          echo "  Removed $MAP_COUNT source map files"

          # Remove declaration files for internal packages.
          # Only the public types package should ship declarations.
          DECL_COUNT=0
          while IFS= read -r dts_file; do
            # Keep declarations for the public types package only
            case "$dts_file" in
              */types/dist/*) : ;;
              *) rm -f "$dts_file"; DECL_COUNT=$((DECL_COUNT + 1)) ;;
            esac
          done < <(find "$WORK_DIR" -name '*.d.ts' 2>/dev/null)
          echo "  Removed $DECL_COUNT internal declaration files"

          # Remove sourceMappingURL comments from JS files
          find "$WORK_DIR" -name '*.js' -exec sed -i 's|//# sourceMappingURL=.*||g' {} +
          echo "  Stripped sourceMappingURL comments"

          # Stub internal fallback paths in any shipped shell files
          # (pattern source is internal; decoded at runtime to avoid publishing it)
          FROM=$(echo "cmVxdWlyZSgiQGNvZGVsZWRnZXIvZW5naW5lIik=" | base64 -d)
          TO=$(echo "cmVxdWlyZSgiLi9jb3JlIik=" | base64 -d)
          find "$WORK_DIR" -name '*shell*.js' -exec sed -i "s|${FROM}|${TO}|g" {} + 2>/dev/null || true

          # Repack tarball
          cd "$WORK_DIR"
          tar czf "$OLDPWD/$TARBALL" package/
          cd "$OLDPWD"
          rm -rf "$WORK_DIR"

          echo "✓ Tarball hardened: removed $MAP_COUNT maps, $DECL_COUNT declarations"

      - name: Verify CLI works
        run: |
          npm install -g "./${NPM_TARBALL}"
          INSTALLED_VERSION=$(codeledger --version 2>/dev/null | grep -oE '^[[:alpha:]-]+ v?[0-9]+\.[0-9]+\.[0-9]+$' | tail -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          echo "Installed CLI version: $INSTALLED_VERSION"

          if [ "$INSTALLED_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch — expected $VERSION, got $INSTALLED_VERSION"
            exit 1
          fi

      - name: Verify no IP leakage in shipped package
        run: |
          echo "Running IP leak detection on shipped tarball..."
          WORK_DIR=$(mktemp -d)
          tar xzf "${NPM_TARBALL}" -C "$WORK_DIR"
          FAIL=0

          # Check 1: No source maps
          MAP_COUNT=$(find "$WORK_DIR" -name '*.js.map' | wc -l)
          if [ "$MAP_COUNT" -gt 0 ]; then
            echo "::error::FAIL: $MAP_COUNT source map files found in package"
            FAIL=1
          else
            echo "  ✓ No source maps"
          fi

          # Check 2: No internal declaration files (public types package excepted)
          DECL_LEAK=0
          while IFS= read -r dts_file; do
            case "$dts_file" in
              */types/dist/*) : ;;
              *) DECL_LEAK=$((DECL_LEAK + 1)) ;;
            esac
          done < <(find "$WORK_DIR" -name '*.d.ts' 2>/dev/null)
          if [ "$DECL_LEAK" -gt 0 ]; then
            echo "::error::FAIL: $DECL_LEAK internal declaration files found"
            FAIL=1
          else
            echo "  ✓ No internal declarations"
          fi

          # Check 3: No sourceMappingURL comments
          URL_COUNT=$(grep -rl 'sourceMappingURL=' "$WORK_DIR" --include='*.js' | wc -l)
          if [ "$URL_COUNT" -gt 0 ]; then
            echo "::error::FAIL: $URL_COUNT files contain sourceMappingURL comments"
            FAIL=1
          else
            echo "  ✓ No sourceMappingURL comments"
          fi

          # Check 4: No test files (may contain architecture-revealing comments)
          TEST_COUNT=$(find "$WORK_DIR" -name '*.test.*' -o -name '*.spec.*' | wc -l)
          if [ "$TEST_COUNT" -gt 0 ]; then
            echo "::error::FAIL: $TEST_COUNT test files found in package"
            FAIL=1
          else
            echo "  ✓ No test files"
          fi

          # Check 5: No proprietary identifiers in open standalone
          # Patterns are base64-encoded to avoid publishing the denylist in a
          # public workflow file. Decoded at runtime, matched against the bundle.
          OPEN_CJS=$(find "$WORK_DIR" -name 'codeledger-open.cjs' | head -1)
          if [ -n "$OPEN_CJS" ]; then
            # Base64-encoded newline-separated pattern list (opaque to casual reading)
            PATTERNS_B64=""
            PATTERNS=$(echo "$PATTERNS_B64" | base64 -d 2>/dev/null || echo "$PATTERNS_B64" | base64 --decode)
            ALGO_HITS=0
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              hits=$(grep -c "$pattern" "$OPEN_CJS" 2>/dev/null || echo 0)
              ALGO_HITS=$((ALGO_HITS + hits))
            done <<< "$PATTERNS"
            if [ "$ALGO_HITS" -gt 0 ]; then
              echo "::error::FAIL: proprietary identifiers found in open standalone"
              FAIL=1
            else
              echo "  ✓ No proprietary identifiers in open standalone"
            fi
          fi

          # Check 6: Open standalone size limit (proxy for leak detection)
          # A clean open build should be under 100KB. Any larger suggests
          # proprietary logic leaked in via transitive imports.
          if [ -n "$OPEN_CJS" ]; then
            SIZE=$(wc -c < "$OPEN_CJS" | tr -d ' ')
            if [ "$SIZE" -gt 102400 ]; then
              echo "::error::FAIL: open standalone exceeds size limit ($SIZE bytes)"
              FAIL=1
            else
              echo "  ✓ Open standalone size OK ($SIZE bytes)"
            fi
          fi

          # Check 7: No internal package references in open standalone
          if [ -n "$OPEN_CJS" ]; then
            # Internal package references (base64-encoded, decoded at runtime)
            PKG_B64="QGNvZGVsZWRnZXIvZW5naW5lCkBjb2RlbGVkZ2VyL3NlbGVjdG9yCnByb3RlY3RlZC1ydW50aW1l"
            PKG_PATTERNS=$(echo "$PKG_B64" | base64 -d 2>/dev/null || echo "$PKG_B64" | base64 --decode)
            ENGINE_HITS=0
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              hits=$(grep -c "$pattern" "$OPEN_CJS" 2>/dev/null || echo 0)
              ENGINE_HITS=$((ENGINE_HITS + hits))
            done <<< "$PKG_PATTERNS"
            if [ "$ENGINE_HITS" -gt 0 ]; then
              echo "::error::FAIL: internal package references in open standalone"
              FAIL=1
            else
              echo "  ✓ No internal package references in open standalone"
            fi
          fi

          rm -rf "$WORK_DIR"

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::IP leak detection failed — package is not safe to ship"
            exit 1
          fi
          echo "✓ All IP leak checks passed (7 checks)"

      - name: Generate MANIFEST.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG_DATE=$(date -u +"%Y-%m-%d")
          SHA256=$(sha256sum "${NPM_TARBALL}" | cut -d' ' -f1)

          # Read feature list from CHANGELOG.md (everything between first ## and second ##)
          CHANGELOG_SECTION=$(awk '/^## '"${VERSION}"'/{found=1; next} /^## [0-9]/{if(found) exit} found{print}' CHANGELOG.md)

          cat > MANIFEST.md << MANIFEST_EOF
          # CodeLedger v${VERSION} — Release Manifest

          **Release date:** ${TAG_DATE}
          **npm package:** \`@codeledger/cli@${VERSION}\`
          **npm verified:** true
          **Git tag:** v${VERSION}
          **Git commit:** $(git rev-parse --short HEAD)
          **Package checksum (SHA-256):** \`${SHA256}\`

          ---

          ## What's in this zip

          This release zip contains the **full installable package** — no internet connection to npm is required.

          | File | Purpose |
          |------|---------|
          | \`${NPM_TARBALL}\` | The npm package (installable offline with \`npm install -g\`) |
          | \`install.sh\` | Installs from the bundled package (with prerequisite checks) |
          | \`README.md\` | Full feature documentation and CLI reference |
          | \`GETTING-STARTED.md\` | Step-by-step setup guide |
          | \`CHANGELOG.md\` | Version history with feature details |
          | \`MANIFEST.md\` | This file — release contents and verification |
          | \`ARCHITECTURE_SPEC.md\` | Unified system architecture specification |
          | \`LICENSE\` | MIT license (CLI, types, repo scanner, harness) |
          | \`LICENSE-CORE\` | CodeLedger Core License (scoring engine binary) |

          ## How to install

          **Option A: From this zip (recommended — works offline)**
          \`\`\`bash
          unzip codeledger-${VERSION}.zip
          cd codeledger-${VERSION}/
          ./install.sh
          \`\`\`

          **Option B: Directly from npm**
          \`\`\`bash
          npm install -g @codeledger/cli@${VERSION}
          \`\`\`

          ## How to verify

          After installation, confirm the version matches this release:

          \`\`\`bash
          codeledger --version
          # Expected: ${VERSION}

          codeledger doctor
          # Runs 8 health checks on your installation
          \`\`\`

          ## Verify package integrity

          \`\`\`bash
          # Check the bundled package checksum
          sha256sum ${NPM_TARBALL}
          # Expected: ${SHA256}
          \`\`\`

          ## Feature verification

          To verify the v${VERSION} feature set is present in your installed CLI:

          \`\`\`bash
          codeledger --version       # Should show: ${VERSION}
          codeledger doctor          # Runs health checks on your installation
          codeledger scan            # Should index files across all supported languages
          codeledger activate --task "Fix auth for api-gateway"
          \`\`\`

          ## npm package contents

          The \`@codeledger/cli\` npm package is self-contained and includes everything needed to run CodeLedger. No separate installs required.

          ## v${VERSION} features
          ${CHANGELOG_SECTION}

          ---

          *Generated automatically by release workflow on ${TAG_DATE}.*
          MANIFEST_EOF

          # Clean leading whitespace from heredoc indentation
          sed -i 's/^          //' MANIFEST.md

      - name: Extract open standalone CLI from package
        run: |
          # Extract the open standalone .cjs from the npm tarball
          # This is the thin open build — safe commands only, no proprietary logic
          WORK_DIR=$(mktemp -d)
          tar xzf "${NPM_TARBALL}" -C "$WORK_DIR"
          # Prefer the open build; fall back to full standalone if open not present
          OPEN_STANDALONE=$(find "$WORK_DIR" -name 'codeledger-open.cjs' | head -1)
          FULL_STANDALONE=$(find "$WORK_DIR" -name 'codeledger-standalone.cjs' | head -1)
          if [ -n "$OPEN_STANDALONE" ]; then
            cp "$OPEN_STANDALONE" codeledger-standalone.cjs
            echo "✓ Using open standalone CLI ($(du -h codeledger-standalone.cjs | cut -f1) — safe commands only)"
            echo "HAS_STANDALONE=true" >> "$GITHUB_ENV"
          elif [ -n "$FULL_STANDALONE" ]; then
            cp "$FULL_STANDALONE" codeledger-standalone.cjs
            echo "::warning::Open standalone not found, falling back to full standalone"
            echo "HAS_STANDALONE=true" >> "$GITHUB_ENV"
          else
            echo "::warning::No standalone CLI found in package — zip will work via npm install only"
            echo "HAS_STANDALONE=false" >> "$GITHUB_ENV"
          fi
          rm -rf "$WORK_DIR"

      - name: Gather release assets
        run: |
          STAGING="codeledger-${VERSION}"
          mkdir -p "$STAGING"

          # Copy the npm package (for npm install -g)
          cp "${NPM_TARBALL}" "$STAGING/"

          # Copy standalone CLI if available (for zero-dependency usage)
          if [ "$HAS_STANDALONE" = "true" ]; then
            mkdir -p "$STAGING/bin"
            cp codeledger-standalone.cjs "$STAGING/bin/"
            echo "  ✓ Standalone CLI included in bin/"
          fi

          # Copy distribution files
          cp install.sh "$STAGING/"
          cp GETTING-STARTED.md "$STAGING/"
          cp README.md "$STAGING/"
          cp CHANGELOG.md "$STAGING/"
          cp MANIFEST.md "$STAGING/"
          cp docs/ARCHITECTURE_SPEC.md "$STAGING/" 2>/dev/null || true
          cp LICENSE "$STAGING/" 2>/dev/null || true
          cp LICENSE-CORE "$STAGING/" 2>/dev/null || true
          chmod +x "$STAGING/install.sh"

          # Create zip
          zip -r "codeledger-${VERSION}.zip" "$STAGING/"

          # Also create a generic name for the "latest" download link
          cp "codeledger-${VERSION}.zip" codeledger.zip

          echo "ZIP_VERSIONED=codeledger-${VERSION}.zip" >> "$GITHUB_ENV"
          echo "ZIP_LATEST=codeledger.zip" >> "$GITHUB_ENV"

      - name: Remove previous releases (keep only the latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cleaning up previous releases..."
          CURRENT_TAG="${GITHUB_REF_NAME}"
          # List all releases, delete any that aren't the current one
          gh release list --limit 50 --json tagName -q '.[].tagName' | while read -r tag; do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              echo "  Deleting release $tag..."
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            fi
          done
          echo "✓ Only v${VERSION} release will remain"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CodeLedger v${{ env.VERSION }}
          body: |
            ## CodeLedger v${{ env.VERSION }}

            ### Install

            **From the zip (works offline):**
            ```bash
            unzip codeledger-${{ env.VERSION }}.zip
            cd codeledger-${{ env.VERSION }}/
            ./install.sh
            ```

            **Or directly from npm:**
            ```bash
            npm install -g @codeledger/cli@${{ env.VERSION }}
            ```

            ### npm verification

            ✅ `@codeledger/cli@${{ env.VERSION }}` verified on npm and bundled in the zip.

            ### Verify after install

            ```bash
            codeledger --version    # Should show: ${{ env.VERSION }}
            codeledger doctor       # Runs 8 health checks
            ```

            ### What's in the zip

            The release zip contains the **full installable package** — the npm tarball is bundled so installation works offline. See `MANIFEST.md` inside the zip for checksums and feature verification steps.

            **Zip contents:** `${{ env.NPM_TARBALL }}` · `install.sh` · `README.md` · `GETTING-STARTED.md` · `CHANGELOG.md` · `MANIFEST.md` · `ARCHITECTURE_SPEC.md` · `LICENSE` · `LICENSE-CORE`

            ### Links

            - 📦 [npm: @codeledger/cli](https://www.npmjs.com/package/@codeledger/cli)
            - 📖 [Getting Started Guide](https://github.com/${{ github.repository }}/blob/main/GETTING-STARTED.md)
            - 📋 [Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: |
            ${{ env.ZIP_VERSIONED }}
            ${{ env.ZIP_LATEST }}
          draft: false
          prerelease: false
