name: CodeLedger PR Intelligence
description: Repo-truth PR intelligence with risk, drift, evidence gaps, demo bridge, and CLI conversion path.
author: Intelligent Context AI, Inc.
branding:
  icon: shield
  color: blue

inputs:
  github-token:
    description: GitHub token used to post or update the sticky PR comment.
    required: true
    default: ${{ github.token }}
  mode:
    description: Enforcement mode for CodeLedger.
    required: false
    default: observe
  base-ref:
    description: Base branch/ref to compare against.
    required: false
    default: ${{ github.base_ref }}
  demo-url:
    description: Base URL for the hosted PR intelligence demo.
    required: false
    default: https://demo.codeledger.dev
  comment:
    description: Whether to post or update the sticky PR comment.
    required: false
    default: 'true'
  suppress-clean:
    description: Suppress the PR comment when risk is low and there are no findings.
    required: false
    default: 'false'
  include-drafts:
    description: Post comments on draft PRs.
    required: false
    default: 'true'
  fail-on-block:
    description: Fail the Action when CodeLedger returns BLOCK.
    required: false
    default: 'false'
  version:
    description: CodeLedger CLI version to install when a repo-local CLI is not present.
    required: false
    default: v0.10.14
  asset-name:
    description: Release asset name for the standalone CLI.
    required: false
    default: codeledger-standalone.cjs
  checksum:
    description: Optional SHA256 checksum for the downloaded CLI asset.
    required: false
    default: ''

outputs:
  status:
    description: CodeLedger PR status.
    value: ${{ steps.pr.outputs.status }}
  risk:
    description: PR intelligence risk level.
    value: ${{ steps.pr.outputs.risk }}
  drift:
    description: PR intelligence drift level.
    value: ${{ steps.pr.outputs.drift }}
  evidence-gaps:
    description: Count of evidence gaps surfaced in the PR summary.
    value: ${{ steps.pr.outputs.evidence_gaps }}
  demo-url:
    description: Hosted demo URL for the full PR intelligence breakdown.
    value: ${{ steps.pr.outputs.demo_url }}
  comment-file:
    description: Path to the rendered Markdown comment.
    value: ${{ steps.pr.outputs.comment_file }}
  result-file:
    description: Path to the JSON result.
    value: ${{ steps.pr.outputs.result_file }}
  cli-path:
    description: Path to the CLI used by the action.
    value: ${{ steps.pr.outputs.cli_path }}

runs:
  using: composite
  steps:
    - name: Resolve CodeLedger install path
      id: resolve-cli
      shell: bash
      env:
        CODELEDGER_VERSION: ${{ inputs.version }}
        CODELEDGER_ASSET_NAME: ${{ inputs.asset-name }}
      run: |
        set -euo pipefail
        INSTALL_DIR="$RUNNER_TEMP/codeledger-cli/$CODELEDGER_VERSION"
        INSTALL_PATH="$INSTALL_DIR/$CODELEDGER_ASSET_NAME"
        {
          echo "install_dir=$INSTALL_DIR"
          echo "install_path=$INSTALL_PATH"
        } >> "$GITHUB_OUTPUT"

    - name: Restore CodeLedger CLI cache
      id: cache-cli
      if: ${{ hashFiles('.codeledger/bin/codeledger', '.codeledger/bin/codeledger-standalone.cjs') == '' }}
      uses: actions/cache@v4
      with:
        path: ${{ steps.resolve-cli.outputs.install_dir }}
        key: codeledger-cli-${{ runner.os }}-${{ inputs.version }}-${{ inputs.asset-name }}

    - name: Download CodeLedger CLI
      if: ${{ hashFiles('.codeledger/bin/codeledger', '.codeledger/bin/codeledger-standalone.cjs') == '' && steps.cache-cli.outputs.cache-hit != 'true' }}
      shell: bash
      env:
        CODELEDGER_VERSION: ${{ inputs.version }}
        CODELEDGER_ASSET_NAME: ${{ inputs.asset-name }}
        CODELEDGER_INSTALL_DIR: ${{ steps.resolve-cli.outputs.install_dir }}
        CODELEDGER_INSTALL_PATH: ${{ steps.resolve-cli.outputs.install_path }}
        CODELEDGER_CHECKSUM: ${{ inputs.checksum }}
      run: |
        set -euo pipefail
        mkdir -p "$CODELEDGER_INSTALL_DIR"
        if [ "$CODELEDGER_VERSION" = "latest" ]; then
          DOWNLOAD_URL="https://github.com/codeledgerECF/codeledger/releases/latest/download/$CODELEDGER_ASSET_NAME"
        else
          DOWNLOAD_URL="https://github.com/codeledgerECF/codeledger/releases/download/$CODELEDGER_VERSION/$CODELEDGER_ASSET_NAME"
        fi
        curl -fsSL "$DOWNLOAD_URL" -o "$CODELEDGER_INSTALL_PATH"
        chmod +x "$CODELEDGER_INSTALL_PATH"
        if [ -n "$CODELEDGER_CHECKSUM" ]; then
          ACTUAL="$(shasum -a 256 "$CODELEDGER_INSTALL_PATH" | awk '{print $1}')"
          if [ "$ACTUAL" != "$CODELEDGER_CHECKSUM" ]; then
            echo "CodeLedger checksum mismatch: expected $CODELEDGER_CHECKSUM, got $ACTUAL" >&2
            exit 1
          fi
        fi

    - name: Run CodeLedger PR Intelligence
      id: pr
      shell: bash
      env:
        CODELEDGER_DEMO_BASE_URL: ${{ inputs.demo-url }}
        CODELEDGER_MODE: ${{ inputs.mode }}
        CODELEDGER_BASE_REF: ${{ inputs.base-ref }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        set -euo pipefail

        mkdir -p "$RUNNER_TEMP/codeledger"
        RESULT_FILE="$RUNNER_TEMP/codeledger/pr-intelligence.json"
        COMMENT_FILE="$RUNNER_TEMP/codeledger/pr-comment.md"
        GH_OUTPUT_FILE="$RUNNER_TEMP/codeledger/github-output.txt"

        if [ -x .codeledger/bin/codeledger ]; then
          CLI=(./.codeledger/bin/codeledger)
        elif [ -f .codeledger/bin/codeledger-standalone.cjs ]; then
          CLI=(node .codeledger/bin/codeledger-standalone.cjs)
        elif [ -f "${{ steps.resolve-cli.outputs.install_path }}" ]; then
          CLI=(node "${{ steps.resolve-cli.outputs.install_path }}")
        else
          CLI=(npx -y codeledger)
        fi

        set +e
        "${CLI[@]}" ci pr-check \
          --json \
          --mode "$CODELEDGER_MODE" \
          --base "$CODELEDGER_BASE_REF" \
          --title "$PR_TITLE" \
          --body "$PR_BODY" \
          --comment-file "$COMMENT_FILE" \
          --github-output "$GH_OUTPUT_FILE" \
          > "$RESULT_FILE"
        CODELEDGER_EXIT=$?
        set -e

        if [ ! -s "$RESULT_FILE" ]; then
          printf '{"status":"WARN","summary":"CodeLedger did not emit a PR intelligence result."}\n' > "$RESULT_FILE"
        fi

        if [ -f "$GH_OUTPUT_FILE" ]; then
          cat "$GH_OUTPUT_FILE" >> "$GITHUB_OUTPUT"
        fi

        node --input-type=module - "$RESULT_FILE" "$GITHUB_OUTPUT" <<'NODE'
        import { readFileSync, appendFileSync } from 'node:fs';
        const [resultPath, outputPath] = process.argv.slice(2);
        let result = {};
        try {
          result = JSON.parse(readFileSync(resultPath, 'utf8'));
        } catch {
          result = {};
        }
        const summary = result.pr_intelligence?.pr_summary ?? {};
        const demo = result.pr_intelligence?.demo ?? {};
        const lines = [
          `risk=${summary.risk ?? ''}`,
          `drift=${summary.drift ?? ''}`,
          `evidence_gaps=${summary.evidence_gaps ?? ''}`,
          `demo_url=${demo.url ?? result.report_url ?? ''}`,
        ];
        appendFileSync(outputPath, `${lines.join('\n')}\n`);
        NODE

        {
          echo "comment_file=$COMMENT_FILE"
          echo "result_file=$RESULT_FILE"
          echo "cli_path=${CLI[*]}"
          echo "codeledger_exit=$CODELEDGER_EXIT"
        } >> "$GITHUB_OUTPUT"

    - name: Post or update PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' && (inputs.include-drafts == 'true' || github.event.pull_request.draft == false) }}
      uses: actions/github-script@v7
      env:
        COMMENT_FILE: ${{ steps.pr.outputs.comment_file }}
        RESULT_FILE: ${{ steps.pr.outputs.result_file }}
        SUPPRESS_CLEAN: ${{ inputs.suppress-clean }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- codeledger-pr-comment -->';
          const resultPath = process.env.RESULT_FILE;
          const commentPath = process.env.COMMENT_FILE;
          let result = {};
          try {
            result = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
          } catch {
            result = {};
          }

          const risk = result.pr_intelligence?.pr_summary?.risk || 'medium';
          const findings = Array.isArray(result.pr_intelligence?.findings) ? result.pr_intelligence.findings : [];
          if (process.env.SUPPRESS_CLEAN === 'true' && risk === 'low' && findings.length === 0) {
            core.info('Suppressing CodeLedger comment: low risk and no findings.');
            return;
          }

          let body = fs.existsSync(commentPath)
            ? fs.readFileSync(commentPath, 'utf8')
            : `${marker}\n## CodeLedger PR Intelligence\n\nCodeLedger did not generate a comment. See workflow logs.`;
          if (!body.includes(marker)) body = `${marker}\n${body}`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100,
          });
          const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
            core.info(`Updated CodeLedger PR Intelligence comment ${existing.id}`);
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            core.info('Created CodeLedger PR Intelligence comment');
          }

    - name: Enforce block result
      if: ${{ inputs.fail-on-block == 'true' && steps.pr.outputs.status == 'BLOCK' }}
      shell: bash
      run: |
        echo "CodeLedger returned BLOCK."
        exit 1
